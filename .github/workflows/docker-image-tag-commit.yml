
name: Docker Image Build/Publish tag with commit

on:
  pull_request:
    branches:
      - 'main'
      - 'support/docker'
  push:
    branches:
      - 'main'
      - 'support/docker'
    tags:
      - 'v*'
    paths:
      - "app/**"
      - "cli/**"
      - "components/**"
      - "lib/**"
      - "prisma/**"
      - "public/**"
      - "scripts/**"
      - "middleware.ts"
      - "next.config.ts"
      - "next-env.d.ts"
      - "prisma.config.ts"
      - "package.json"
      - "package-lock.json"
      - "docker/Dockerfile"
      - "docker/docker-entrypoint.sh"
      - ".github/workflows/docker-image-tag-commit.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-tag-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get git short head
        uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with:
          length: 7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Meta data image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/siftly
            ghcr.io/${{ github.repository_owner }}/siftly
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ steps.short-sha.outputs.sha }}

      - name: Build push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo ${{ steps.build.outputs.digest }}
